# Tells Railway to use the API folder (not the repo root)
[build]
builder = "NIXPACKS"
buildCommand = "npm install --prefix backend --omit=dev"

[deploy]
startCommand = "cd backend && npm start"
restartPolicyType = "ON_FAILURE"

[build.env]
PUPPETEER_SKIP_DOWNLOAD = "true"
PUPPETEER_SKIP_CHROMIUM_DOWNLOAD = "true"
